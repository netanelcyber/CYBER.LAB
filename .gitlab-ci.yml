stages:
  - test
  - run

image: python:3.12-slim

cache:
  paths:
    - .cache/pip

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install -e .

unit_tests:
  stage: test
  script:
    - pytest -q

run_scenarios:
  stage: run
  script:
    - python scripts/run_scenarios.py
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - artifacts/scenario_summaries.csv
      - artifacts/scenario_summaries.json
