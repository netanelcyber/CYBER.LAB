<VirtualHost *:80>
    ServerName drupal-apache.local
    ServerAdmin admin@drupal-apache.local
    
    DocumentRoot /var/www/html
    
    # Enable Apache modules needed for the lab
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /
        
        # Drupal clean URLs
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php?q=$1 [L,QSA]
    </IfModule>
    
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Intentionally weak permissions for lab testing
        <FilesMatch "\.php$">
            SetHandler "proxy:unix:/run/php-fpm.sock|fcgi://localhost"
        </FilesMatch>
    </Directory>
    
    # Enable PHP-FPM
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php-fpm.sock|fcgi://localhost"
    </FilesMatch>
    
    # Error logging for detection
    ErrorLog ${APACHE_LOG_DIR}/drupal-error.log
    CustomLog ${APACHE_LOG_DIR}/drupal-access.log combined
    
    # Security headers (intentionally weak for testing)
    Header set Server "Apache/2.4.41"
    Header set X-Powered-By "Drupal"
    Header unset X-Content-Type-Options
    Header unset X-Frame-Options
    
    # Allow .htaccess overrides
    <Directory "/var/www/html">
        AllowOverride All
    </Directory>
</VirtualHost>
