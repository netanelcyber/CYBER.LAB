user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # RADWARE WAF Simulator Rules
    
    # Rate limiting per IP
    limit_req_zone $binary_remote_addr zone=waf_limit:10m rate=5r/m;
    
    # Cache for CAPTCHA tokens
    map $http_user_agent $is_bot {
        default 0;
        ~*python 1;
        ~*curl 1;
        ~*wget 1;
        ~*scrapy 1;
        ~*bot 1;
    }

    upstream drupal7_backend {
        server drupal7-app:80;
    }

    upstream wordpress_backend {
        server wordpress-app:80;
    }

    server {
        listen 80 default_server;
        server_name localhost;

        # RADWARE WAF Protection
        
        # Rule 1: Block known bot User-Agents
        if ($is_bot) {
            return 403;
        }

        # Rule 2: Rate limiting
        limit_req zone=waf_limit burst=10 nodelay;

        # Rule 3: Block SQL injection patterns
        if ($request_uri ~* "(union|select|insert|update|delete|drop|exec|execute|script|javascript|onerror|alert|<|>)") {
            return 403;
        }

        # Rule 4: Block path traversal
        if ($request_uri ~* "(\.\.|/etc/|/proc/|\.\./)") {
            return 403;
        }

        # Rule 5: Require valid headers for sensitive paths
        location ~ "^/(admin|sites/default|wp-admin)" {
            if ($http_user_agent = "") {
                return 403;
            }
            if ($http_referer = "") {
                # Show CAPTCHA page
                return 200;
            }
        }

        # Drupal 7 proxy
        location /drupal7/ {
            proxy_pass http://drupal7_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WordPress proxy
        location /wordpress/ {
            proxy_pass http://wordpress_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # CAPTCHA page
        location /captcha {
            default_type text/html;
            return 200 '<html><body><h1>Radware WAF - CAPTCHA Challenge</h1><p>Please complete the CAPTCHA to continue.</p><script>console.log("Radware CAPTCHA");</script></body></html>';
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
