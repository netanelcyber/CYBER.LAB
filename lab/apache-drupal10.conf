<VirtualHost *:80>
    ServerName drupal10.local
    ServerAdmin admin@drupal10.local
    
    DocumentRoot /var/www/html
    
    # Enable Apache modules
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /
        
        # Drupal 10 clean URLs
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php?q=$1 [L,QSA]
    </IfModule>
    
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # Permissions for testing
    <Directory "/var/www/html/sites/default">
        AllowOverride All
    </Directory>
    
    # Error logging
    ErrorLog ${APACHE_LOG_DIR}/drupal10-error.log
    CustomLog ${APACHE_LOG_DIR}/drupal10-access.log combined
    
    # Headers for detection
    Header set Server "Apache/2.4 + Drupal10"
    Header set X-Powered-By "Drupal 10"
    Header set X-Generator "Drupal 10"
</VirtualHost>
