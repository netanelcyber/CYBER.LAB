<VirtualHost *:80>
    ServerName wordpress-apache.local
    ServerAdmin admin@wordpress-apache.local
    
    DocumentRoot /var/www/html
    
    # Enable Apache modules needed for WordPress
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /
        
        # WordPress pretty permalinks
        RewriteRule ^index\.php$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.php [L]
    </IfModule>
    
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Intentionally weak permissions for lab testing
        <FilesMatch "\.php$">
            SetHandler "proxy:unix:/run/php-fpm.sock|fcgi://localhost"
        </FilesMatch>
    </Directory>
    
    # Enable PHP-FPM
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php-fpm.sock|fcgi://localhost"
    </FilesMatch>
    
    # Error logging for detection
    ErrorLog ${APACHE_LOG_DIR}/wordpress-error.log
    CustomLog ${APACHE_LOG_DIR}/wordpress-access.log combined
    
    # Security headers (intentionally weak for testing)
    Header set Server "Apache/2.4.41"
    Header set X-Powered-By "WordPress"
    Header unset X-Content-Type-Options
    Header unset X-Frame-Options
    
    # Expose WordPress version
    Header set X-WordPress-Version "6.2"
</VirtualHost>
