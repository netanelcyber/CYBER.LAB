version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # ACTIVE DIRECTORY & DOMAIN SERVICES
  # ═══════════════════════════════════════════════════════════════════════════

  samba-dc:
    image: samba:4.20
    container_name: cyber-lab-domain-controller
    hostname: DC01.cyber.lab
    environment:
      DOMAIN: cyber.lab
      REALM: CYBER.LAB
      ADMINPASS: P@ssw0rd2026!
      LDAP_ADMIN_PASSWORD: admin123456
    volumes:
      - samba_data:/var/lib/samba
      - samba_config:/etc/samba
    ports:
      - "389:389"    # LDAP
      - "636:636"    # LDAP SSL
      - "138:138"    # NetBIOS
      - "139:139"    # NetBIOS
      - "445:445"    # SMB
      - "464:464"    # Kerberos
      - "53:53"      # DNS
    networks:
      lab-network:
        ipv4_address: 172.28.0.2

  # OpenLDAP as secondary directory service
  openldap:
    image: osixia/openldap:latest
    container_name: cyber-lab-ldap
    environment:
      LDAP_ORGANISATION: "CYBER Security Lab"
      LDAP_DOMAIN: cyber.lab
      LDAP_ADMIN_PASSWORD: admin123456
      LDAP_BASE_DN: dc=cyber,dc=lab
    volumes:
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
    ports:
      - "390:389"    # LDAP (different port from Samba)
      - "637:636"    # LDAP SSL
    networks:
      lab-network:
        ipv4_address: 172.28.0.3

  # LDAP Management UI
  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: cyber-lab-ldap-admin
    depends_on:
      - openldap
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_LDAP_CLIENT_ADD: "true"
    ports:
      - "8080:80"
    networks:
      lab-network:
        ipv4_address: 172.28.0.4

  # ═══════════════════════════════════════════════════════════════════════════
  # EXCHANGE & EMAIL SERVICES
  # ═══════════════════════════════════════════════════════════════════════════

  # Mail Server (Postfix + Dovecot simulating Exchange)
  mail-server:
    image: tvial/docker-mailserver:2.5.0
    container_name: cyber-lab-exchange-server
    hostname: exchange.cyber.lab
    domainname: cyber.lab
    depends_on:
      - samba-dc
    environment:
      OVERRIDE_HOSTNAME: exchange.cyber.lab
      DOMAIN_NAME: cyber.lab
      MAIL_USER: admin@cyber.lab|P@ssw0rd2026!
      MAIL_PASS: P@ssw0rd2026!
      TZ: UTC
      ONE_DIR: "false"
      DMS_DBPASS: p@ssw0rd
      ENABLE_LDAP: "1"
      LDAP_SERVER_HOST: "samba-dc"
      LDAP_SEARCH_BASE: "dc=cyber,dc=lab"
      LDAP_BIND_DN: "cn=admin,dc=cyber,dc=lab"
      LDAP_BIND_PASSWORD: "admin123456"
      POSTFIX_MAILBOX_SIZE_LIMIT: 0
      POSTFIX_MESSAGE_SIZE_LIMIT: 0
    volumes:
      - mail_data:/var/mail
      - mail_state:/var/mail-state
      - mail_config:/etc/postfix
    ports:
      - "25:25"      # SMTP
      - "143:143"    # IMAP
      - "587:587"    # Submission
      - "993:993"    # IMAPS
      - "110:110"    # POP3
      - "995:995"    # POP3S
    networks:
      lab-network:
        ipv4_address: 172.28.0.5

  # O365 API Simulator (Azure AD Mock)
  o365-simulator:
    image: node:18-alpine
    container_name: cyber-lab-o365-simulator
    depends_on:
      - openldap
    volumes:
      - ./o365-simulator.js:/app/server.js
      - ./o365-users.json:/app/users.json
    ports:
      - "8090:3000"    # O365 API port
    networks:
      lab-network:
        ipv4_address: 172.28.0.6
    command: node /app/server.js

  # OneDrive/SharePoint Simulator
  sharepoint-simulator:
    image: node:18-alpine
    container_name: cyber-lab-sharepoint
    depends_on:
      - o365-simulator
    volumes:
      - sharepoint_data:/app/data
      - ./sharepoint-simulator.js:/app/server.js
    ports:
      - "8091:3000"    # SharePoint port
    networks:
      lab-network:
        ipv4_address: 172.28.0.7
    command: node /app/server.js

  # ═══════════════════════════════════════════════════════════════════════════
  # WEB LABS (Previous Setup)
  # ═══════════════════════════════════════════════════════════════════════════

  # Drupal 7 Lab
  drupal7-db:
    image: mysql:5.7
    container_name: drupal7-db
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: drupal123456
    volumes:
      - drupal7_db:/var/lib/mysql
    networks:
      lab-network:
        ipv4_address: 172.28.0.21

  drupal7:
    image: drupal:7.96
    container_name: drupal7-app
    depends_on:
      - drupal7-db
    environment:
      DRUPAL_DB_HOST: drupal7-db:3306
      DRUPAL_DB_NAME: drupal
      DRUPAL_DB_USER: drupal
      DRUPAL_DB_PASSWORD: drupal123456
    volumes:
      - drupal7_files:/var/www/html/sites/default/files
    ports:
      - "8001:80"
    networks:
      lab-network:
        ipv4_address: 172.28.0.22

  # WordPress Lab
  wordpress-db:
    image: mysql:5.7
    container_name: wordpress-db
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress123456
    volumes:
      - wordpress_db:/var/lib/mysql
    networks:
      lab-network:
        ipv4_address: 172.28.0.23

  wordpress:
    image: wordpress:6.2-php7.4
    container_name: wordpress-app
    depends_on:
      - wordpress-db
    environment:
      WORDPRESS_DB_HOST: wordpress-db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress123456
      WORDPRESS_DEBUG: "true"
    volumes:
      - wordpress_files:/var/www/html
    ports:
      - "8002:80"
    networks:
      lab-network:
        ipv4_address: 172.28.0.24

  # ═══════════════════════════════════════════════════════════════════════════
  # UNPATCHED/VULNERABLE MACHINE (Connected to Outside World)
  # ═══════════════════════════════════════════════════════════════════════════

  unpatched-windows:
    image: mcr.microsoft.com/windows/servercore:ltsc2016
    container_name: cyber-lab-unpatched-machine
    depends_on:
      - samba-dc
    environment:
      ADMIN_PASSWORD: P@ssw0rd2026!
      SERVER_NAME: UNPATCHED-PC01
      DOMAIN: cyber.lab
    volumes:
      - unpatched_system:/windows-system
      - unpatched_data:/data
    ports:
      - "3389:3389"    # RDP
      - "8888:80"      # HTTP (unpatched web server)
      - "8889:443"     # HTTPS (unpatched)
    networks:
      lab-network:
        ipv4_address: 172.28.0.40
      outside-network:  # Also connected to outside world

  # Unpatched Linux machine
  unpatched-linux:
    image: ubuntu:16.04
    container_name: cyber-lab-unpatched-linux
    depends_on:
      - samba-dc
    privileged: true
    volumes:
      - unpatched_linux:/root
      - ./install-unpatched.sh:/install.sh
    ports:
      - "22:22"        # SSH (OpenSSH 7.2 - vulnerable)
      - "8444:8080"    # HTTP (old Apache)
    networks:
      lab-network:
        ipv4_address: 172.28.0.41
      outside-network:
    command: /bin/bash -c "chmod +x /install.sh && /install.sh && /bin/bash"

  # ═══════════════════════════════════════════════════════════════════════════
  # MONITORING & ANALYSIS
  # ═══════════════════════════════════════════════════════════════════════════

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0
    container_name: cyber-lab-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      lab-network:
        ipv4_address: 172.28.0.50

  kibana:
    image: docker.elastic.co/kibana/kibana:8.0.0
    container_name: cyber-lab-kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      lab-network:
        ipv4_address: 172.28.0.51

volumes:
  samba_data:
  samba_config:
  openldap_data:
  openldap_config:
  mail_data:
  mail_state:
  mail_config:
  sharepoint_data:
  drupal7_db:
  drupal7_files:
  wordpress_db:
  wordpress_files:
  elasticsearch_data:
  unpatched_system:
  unpatched_data:
  unpatched_linux:

networks:
  lab-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  outside-network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24
