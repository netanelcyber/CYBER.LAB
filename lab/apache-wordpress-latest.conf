<VirtualHost *:80>
    ServerName wordpress-latest.local
    ServerAdmin admin@wordpress-latest.local
    
    DocumentRoot /var/www/html
    
    # Enable rewrite module
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /
        
        # WordPress pretty permalinks
        RewriteRule ^index\.php$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.php [L]
    </IfModule>
    
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # Permissions for plugin directory
    <Directory "/var/www/html/wp-content/plugins">
        AllowOverride All
    </Directory>
    
    # Error logging
    ErrorLog ${APACHE_LOG_DIR}/wordpress-latest-error.log
    CustomLog ${APACHE_LOG_DIR}/wordpress-latest-access.log combined
    
    # Headers revealing version for detection
    Header set Server "Apache/2.4 + PHP/8.2"
    Header set X-Powered-By "PHP/8.2"
    Header set X-WordPress-Version "6.5+"
    Header unset X-Content-Type-Options
</VirtualHost>
